<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion Admin Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-950 text-white">

<!-- NAV -->
<nav class="flex justify-between items-center p-4 bg-gray-900 border-b border-gray-800">
  <h1 class="text-xl font-bold">🚀 Verion Admin Panel</h1>
  <div id="userBox"></div>
</nav>

<!-- MAIN GRID -->
<div class="grid grid-cols-3 gap-4 p-6">

  <!-- CONTROL PANEL -->
  <div class="bg-gray-900 p-4 rounded border border-gray-800">
    <h2 class="text-lg font-semibold mb-3">Control Panel</h2>

    <input id="dataInput" placeholder="Enter data..."
      class="w-full p-2 mb-2 bg-gray-800 rounded text-white outline-none">

    <button id="saveBtn"
      class="w-full bg-green-600 py-2 rounded mb-2 hover:bg-green-700">
      Save Data
    </button>

    <button id="loadBtn"
      class="w-full bg-blue-600 py-2 rounded hover:bg-blue-700">
      Load Data
    </button>
  </div>

  <!-- OUTPUT -->
  <div class="bg-gray-900 p-4 rounded border border-gray-800">
    <h2 class="text-lg font-semibold mb-3">Execution Output</h2>
    <div id="outputBox" class="text-sm text-gray-300 space-y-2"></div>
  </div>

  <!-- DATABASE -->
  <div class="bg-gray-900 p-4 rounded border border-gray-800">
    <h2 class="text-lg font-semibold mb-3">Database Records</h2>
    <div id="dbBox" class="space-y-2 text-sm"></div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // ✅ Move to ENV in production
  const SUPABASE_URL = 'https://glxteylzcrqejaxnifiz.supabase.co';
  const SUPABASE_KEY = 'YOUR_PUBLIC_ANON_KEY';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const userBox = document.getElementById("userBox");
  const outputBox = document.getElementById("outputBox");
  const dbBox = document.getElementById("dbBox");
  const saveBtn = document.getElementById("saveBtn");
  const loadBtn = document.getElementById("loadBtn");

  const setOutput = (msg, color="gray") => {
    outputBox.innerHTML = `<p class="text-${color}-400">${msg}</p>`;
  };

  const sanitize = (str) => {
    return str.replace(/[<>]/g, "");
  };

  // 🔐 AUTH CHECK
  const { data: { user }, error: authError } = await supabase.auth.getUser();

  if (authError || !user) {
    window.location.href = "index.html";
    return;
  }

  userBox.innerHTML = `
    <span class="text-sm mr-2">${sanitize(user.email)}</span>
    <button id="logoutBtn" class="bg-red-600 px-3 py-1 rounded">Logout</button>
  `;

  document.getElementById("logoutBtn").onclick = async () => {
    await supabase.auth.signOut();
    window.location.href = "index.html";
  };

  // 🟢 SAVE DATA
  saveBtn.onclick = async () => {
    const input = document.getElementById("dataInput");
    const value = sanitize(input.value.trim());

    if (!value) {
      setOutput("Enter valid data", "red");
      return;
    }

    saveBtn.disabled = true;
    setOutput("Saving...", "blue");

    const { error } = await supabase.from("projects").insert([
      { name: value, user_id: user.id }
    ]);

    saveBtn.disabled = false;

    if (error) {
      console.error(error);
      setOutput("Save failed", "red");
      return;
    }

    input.value = "";
    setOutput("Data saved successfully ✅", "green");
    loadData();
  };

  // 🔵 LOAD DATA
  async function loadData() {
    loadBtn.disabled = true;
    setOutput("Loading...", "blue");

    const { data, error } = await supabase
      .from("projects")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });

    loadBtn.disabled = false;

    if (error) {
      console.error(error);
      setOutput("Load failed", "red");
      return;
    }

    dbBox.innerHTML = "";

    if (!data || data.length === 0) {
      dbBox.innerHTML = `<p class="text-gray-500">No data found</p>`;
      return;
    }

    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "bg-gray-800 p-2 rounded";
      div.textContent = item.name; // ✅ safer than innerHTML
      dbBox.appendChild(div);
    });

    setOutput("Data loaded ✔", "blue");
  }

  loadBtn.onclick = loadData;

  // 🚀 AUTO LOAD
  loadData();

});
</script>

</body>
</html>
