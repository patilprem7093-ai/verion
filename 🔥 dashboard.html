<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Verion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- NAV -->
<nav class="flex justify-between items-center p-4 bg-gray-800">
  <h1 class="text-xl font-bold">🚀 Verion Dashboard</h1>
  <div id="userArea"></div>
</nav>

<!-- MAIN -->
<div class="p-6">
  <h2 class="text-2xl mb-4">Welcome</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
    <div class="bg-gray-800 p-4 rounded">Editor</div>
    <div class="bg-gray-800 p-4 rounded">Projects</div>
    <div class="bg-gray-800 p-4 rounded">Deploy</div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // 🔐 Supabase init (move keys to env in production)
  const supabase = window.supabase.createClient(
    'https://glxteylzcrqejaxnifiz.supabase.co',
    'YOUR_PUBLIC_ANON_KEY'
  );

  const userArea = document.getElementById("userArea");

  // 🟡 Loading state
  userArea.innerHTML = `<span class="text-sm text-gray-400">Loading...</span>`;

  try {
    // ✅ Get current session FIRST (important fix)
    const { data: { session }, error } = await supabase.auth.getSession();

    if (error) throw error;

    if (!session) {
      window.location.href = "index.html";
      return;
    }

    renderUser(session.user);

    // 🔁 Listen for auth changes
    supabase.auth.onAuthStateChange((_event, session) => {
      if (!session) {
        window.location.href = "index.html";
      } else {
        renderUser(session.user);
      }
    });

  } catch (err) {
    console.error("Auth error:", err.message);
    window.location.href = "index.html";
  }

  // 👤 Render user UI (XSS safe)
  function renderUser(user) {
    userArea.innerHTML = "";

    const emailSpan = document.createElement("span");
    emailSpan.className = "mr-3 text-sm";
    emailSpan.textContent = user.email;

    const logoutBtn = document.createElement("button");
    logoutBtn.className = "bg-red-600 px-3 py-1 rounded";
    logoutBtn.textContent = "Logout";
    logoutBtn.onclick = logout;

    userArea.appendChild(emailSpan);
    userArea.appendChild(logoutBtn);
  }

  // 🔓 Logout (FIXED BUG)
  async function logout() {
    try {
      await supabase.auth.signOut();
      window.location.href = "index.html"; // ✅ fixed line
    } catch (err) {
      console.error("Logout error:", err.message);
    }
  }

});
</script>

</body>
</html>
