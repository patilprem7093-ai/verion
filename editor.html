<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verion IDE</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html,body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family:Inter,system-ui,sans-serif;
      background:#0b0f17;
      color:white;
    }

    textarea{
      resize:none;
      outline:none;
      border:none;
    }

    .btn{
      background:#4F7C82;
      padding:10px 18px;
      border-radius:10px;
      font-size:14px;
      transition:.2s;
    }

    .btn:hover{
      filter:brightness(1.12);
    }

    .panel{
      background:#111827;
      border:1px solid #1f2937;
    }

    .chip{
      background:white;
      color:black;
      padding:8px 16px;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
    }

    .searchbox{
      flex:1;
      background:#1f2937;
      border:none;
      color:white;
      padding:12px 18px;
      border-radius:12px;
      outline:none;
      font-size:14px;
    }

    .console-ok{
      color:#22c55e;
    }

    .console-warn{
      color:#eab308;
    }

    .console-err{
      color:#ef4444;
    }

    .console-ai{
      color:#8b5cf6;
    }
  </style>
</head>

<body>

<div class="flex h-screen">

  <!-- LEFT SIDEBAR -->
  <aside class="w-72 panel border-r flex flex-col">

    <div class="p-5 border-b border-gray-800">
      <h1 class="text-xl font-bold">● VERION</h1>
      <p class="text-xs text-gray-400 mt-1">Professional Cloud IDE</p>
    </div>

    <div class="p-4">
      <button class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-medium">
        + New Project
      </button>
    </div>

    <div class="px-4 pb-3">
      <input
        placeholder="Search files..."
        class="w-full bg-[#1f2937] px-4 py-3 rounded-xl outline-none text-sm"
      >
    </div>

    <div class="px-4 text-xs text-gray-500 uppercase mb-2">
      Explorer
    </div>

    <div class="px-2 space-y-1">
      <button onclick="switchFile('html')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-[#1f2937]">
        📄 index.html
      </button>

      <button onclick="switchFile('css')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-[#1f2937]">
        🎨 style.css
      </button>

      <button onclick="switchFile('js')" class="w-full text-left px-4 py-3 rounded-lg hover:bg-[#1f2937]">
        ⚙ script.js
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <main class="flex-1 flex flex-col min-w-0">

    <!-- TOPBAR -->
    <header class="h-16 panel border-b flex items-center gap-3 px-5 shrink-0">

      <div class="font-bold text-lg shrink-0">
  V VERION
</div>

<input
  id="smartSearch"
  class="searchbox"
  placeholder="Search bar"
>

<button id="aiFocusBtn" class="chip shrink-0">
  AI
</button>
      

      <button class="btn">Preview</button>
      <button onclick="saveCode()" class="btn">Save</button>
      <button onclick="runCode()" class="btn">Run</button>
      <button class="btn">Deploy</button>

    </header>
        <!-- WORKSPACE -->
    <div class="flex flex-1 min-h-0">

      <!-- CENTER EDITOR -->
      <section class="flex-1 flex flex-col border-r border-gray-800 min-w-0">

        <!-- FILE TAB -->
        <div class="h-12 bg-[#0f172a] border-b border-gray-800 flex items-center px-4 text-sm text-gray-300 shrink-0">
          <span id="activeFile">index.html</span>
        </div>

        <!-- CODE AREA -->
        <textarea
          id="editor"
          class="flex-1 bg-[#0d1117] text-white p-5 text-sm font-mono leading-7"
          spellcheck="false"
        ></textarea>

        <!-- CONSOLE -->
        <div class="h-32 bg-black border-t border-gray-800 p-4 overflow-auto shrink-0">
          <div id="console" class="console-ok text-sm">
            Console ready...
          </div>
        </div>

      </section>

      <!-- RIGHT AI SIDEBAR -->
      <aside class="w-[420px] panel flex flex-col shrink-0">

        <div class="h-14 border-b border-gray-800 flex items-center px-4 font-semibold">
          AI Assistant
        </div>

        <div class="p-4 border-b border-gray-800">
          <textarea
            id="aiPrompt"
            class="w-full h-28 bg-[#1f2937] rounded-xl p-4 text-sm text-white"
            placeholder="Ask AI anything..."
          ></textarea>

          <button
            id="askAiBtn"
            class="mt-3 w-full bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-medium"
          >
            Ask AI
          </button>
        </div>

        <div
          id="aiOutput"
          class="flex-1 overflow-auto p-4 text-sm leading-7 text-white"
        >
          <p class="console-ai">
            AI ready. Ask coding questions here.
          </p>
        </div>

      </aside>

    </div>

  </main>

</div>
<script>
let files = {
  html: "<h1>Hello Verion 🚀</h1>",
  css: "body{font-family:sans-serif;padding:20px;} h1{color:blue;}",
  js: "console.log('Verion Ready');"
};

let currentFile = "html";

const editor = document.getElementById("editor");
const activeFile = document.getElementById("activeFile");
const consoleBox = document.getElementById("console");
const aiPrompt = document.getElementById("aiPrompt");
const aiOutput = document.getElementById("aiOutput");

function switchFile(type){
  files[currentFile] = editor.value;
  currentFile = type;

  if(type==="html") activeFile.innerText = "index.html";
  if(type==="css") activeFile.innerText = "style.css";
  if(type==="js") activeFile.innerText = "script.js";

  editor.value = files[type];
  consoleBox.className = "console-ok text-sm";
  consoleBox.innerText = activeFile.innerText + " opened ✅";
}

function saveCode(){
  files[currentFile] = editor.value;
  consoleBox.className = "console-ok text-sm";
  consoleBox.innerText = "Saved successfully ✅";
}

function runCode(){
  files[currentFile] = editor.value;
  consoleBox.className = "console-ok text-sm";
  consoleBox.innerText = "App compiled successfully 🚀";
}

document.getElementById("aiFocusBtn").onclick = () => {
  aiPrompt.focus();
};

document.getElementById("askAiBtn").onclick = () => {
  const q = aiPrompt.value.trim();

  if(!q){
    aiOutput.innerHTML =
      '<p class="console-warn">Write a question first.</p>';
    return;
  }

  aiOutput.innerHTML = `
    <p class="console-ai mb-3"><b>AI:</b> I found your request.</p>
    <p class="text-white">Question:</p>
    <p class="text-yellow-400 mt-1">${q}</p>
    <p class="text-green-400 mt-4">Suggestion:</p>
    <p class="mt-1">Feature is ready for Gemini API connection.</p>
  `;
};

document.getElementById("smartSearch").addEventListener("input",(e)=>{
  const value = e.target.value.toLowerCase();

  if(
    files[currentFile]
    .toLowerCase()
    .includes(value)
  ){
    consoleBox.className = "console-ai text-sm";
    consoleBox.innerText = "Match found in code 🔍";
  }
});

switchFile("html");
</script>

</body>
</html>
