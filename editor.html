<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion Editor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body class="bg-[#0d1117] text-white">

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-64 bg-[#161b22] border-r border-gray-800 flex flex-col shrink-0">
    <div class="p-4 border-b border-gray-800">
      <h1 class="text-lg font-bold">🚀 Verion</h1>
      <p class="text-xs text-gray-400 mt-1">Cloud IDE</p>
    </div>

    <div class="p-4">
      <button type="button"
        class="w-full bg-blue-600 hover:bg-blue-500 rounded p-2 text-sm">
        + New Project
      </button>
    </div>

    <div class="px-4 text-xs uppercase text-gray-500 mb-2">
      Files
    </div>

    <div class="space-y-1 px-2">
      <button type="button"
        class="w-full text-left px-3 py-2 rounded hover:bg-[#21262d]">
        📄 index.html
      </button>

      <button type="button"
        class="w-full text-left px-3 py-2 rounded hover:bg-[#21262d]">
        🎨 style.css
      </button>

      <button type="button"
        class="w-full text-left px-3 py-2 rounded hover:bg-[#21262d]">
        ⚙ script.js
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 flex flex-col min-w-0">

    <!-- Top bar -->
    <header class="h-14 bg-[#161b22] border-b border-gray-800 flex items-center justify-between px-5 shrink-0">
      <div class="font-medium truncate">
        Project: My First App
      </div>

      <div class="flex gap-2">
        <button type="button"
          class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded text-sm">
          Save
        </button>

        <button type="button"
          class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded text-sm">
          Run
        </button>

        <button type="button"
          class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded text-sm">
          AI
        </button>

        <button type="button"
          class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded text-sm">
          Deploy
        </button>
      </div>
    </header>

    <!-- Workspace -->
    <div class="flex flex-1 min-h-0">

      <!-- Editor -->
      <section class="flex-1 border-r border-gray-800 flex flex-col min-w-0">
        <div class="bg-[#161b22] px-4 py-2 border-b border-gray-800 text-sm text-gray-300 shrink-0">
          index.html
        </div>

        <div class="flex-1 overflow-auto p-5 font-mono text-sm text-gray-400">
<pre class="whitespace-pre-wrap">
&lt;h1&gt;Hello Verion&lt;/h1&gt;
&lt;p&gt;Professional Cloud IDE&lt;/p&gt;
</pre>
        </div>
      </section>

      <!-- Preview -->
      <section class="w-[40%] min-w-[320px] flex flex-col shrink-0">
        <div class="bg-[#161b22] px-4 py-2 border-b border-gray-800 text-sm text-gray-300 shrink-0">
          Live Preview
        </div>

        <iframe
          title="Preview"
          sandbox="allow-scripts"
          class="flex-1 bg-white border-0">
        </iframe>
      </section>

    </div>

  </main>

</div>

</body>
</html>
