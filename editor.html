<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#111827" />
<title>Verion IDE</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{margin:0;background:#0b0f17;color:white;font-family:sans-serif;overflow:hidden}
textarea{resize:none;outline:none;border:none}
.panel{background:#111827;border-color:#1f2937}
.console-ok{color:#22c55e}
.console-warn{color:#eab308}
.console-err{color:#ef4444}
.logo{width:32px;height:32px;background:#4F7C82;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:bold}
</style>
</head>

<body>

<div class="flex h-screen relative overflow-hidden">

<div id="mobileOverlay" onclick="toggleSidebar()" class="fixed inset-0 bg-black/60 z-40 hidden md:hidden transition-opacity"></div>

<aside id="leftSidebar" class="absolute inset-y-0 left-0 z-50 w-64 panel border-r flex flex-col transform -translate-x-full transition-transform duration-300 md:relative md:translate-x-0">
  <div class="p-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="logo">V</div>
      <b>VERION</b>
    </div>
    <button onclick="toggleSidebar()" class="md:hidden text-gray-400 text-xl font-bold">&times;</button>
  </div>

  <div class="p-2">
    <button onclick="ide.newProject()" class="w-full bg-blue-600 p-2 rounded">+ New</button>
  </div>

  <button onclick="switchFile('html')" class="p-2 text-left hover:bg-gray-800">📄 index.html</button>
  <button onclick="switchFile('css')" class="p-2 text-left hover:bg-gray-800">🎨 style.css</button>
  <button onclick="switchFile('js')" class="p-2 text-left hover:bg-gray-800">⚙ script.js</button>
</aside>

<div class="flex-1 flex flex-col min-w-0">

<div class="p-2 flex items-center gap-2 panel border-b">
  <div onclick="toggleSidebar()" class="logo cursor-pointer md:hidden">V</div>
  
  <div class="flex-1"></div>
  
  <button onclick="saveCode()" class="bg-gray-700 px-3 py-1 rounded">Save</button>
  <button onclick="runCode()" class="bg-green-600 px-3 py-1 rounded">Run</button>
  <button onclick="toggleAI()" class="bg-purple-600 px-3 py-1 rounded">AI</button>
</div>

<div class="flex flex-1 relative min-h-0">

<div class="flex flex-col w-full md:w-1/2 flex-1 border-r border-gray-800">
  <div class="p-2 text-xs bg-gray-900" id="activeFile">index.html</div>
  <textarea id="editor" class="flex-1 bg-black p-3 text-sm"></textarea>
  <div id="console" class="h-28 bg-black p-2 text-xs overflow-auto"></div>
</div>

<div id="previewScreen" class="absolute inset-0 z-30 hidden flex-col bg-white md:relative md:w-1/2">
  <div class="p-2 bg-gray-200 text-black flex justify-between items-center">
    <b>Preview</b>
    <button onclick="closePreview()" class="bg-red-500 text-white px-3 py-1 rounded text-xs font-bold">X</button>
  </div>
  <iframe id="previewFrame" class="flex-1 w-full h-full border-none"></iframe>
</div>

<div id="rightSidebar" class="absolute inset-y-0 right-0 z-40 w-full md:w-80 panel border-l hidden flex-col md:relative shadow-2xl md:shadow-none">
  <div class="p-2 border-b flex justify-between items-center">
    <span>AI Assistant</span>
    <button onclick="toggleAI()" class="md:hidden text-gray-400 font-bold text-lg">&times;</button>
  </div>
  <textarea id="aiPrompt" class="p-2 h-24 bg-gray-800"></textarea>
  <button id="askAiBtn" class="bg-purple-600 p-2">Ask</button>
  <div id="aiOutput" class="flex-1 p-2 text-xs overflow-auto"></div>
</div>

</div>
</div>
</div>

<script>
class VerionIDE{

constructor(){
this.editor=document.getElementById("editor");
this.console=document.getElementById("console");
this.previewFrame=document.getElementById("previewFrame");
this.previewScreen=document.getElementById("previewScreen");
this.activeFile=document.getElementById("activeFile");
this.rightSidebar=document.getElementById("rightSidebar");
this.leftSidebar=document.getElementById("leftSidebar");
this.mobileOverlay=document.getElementById("mobileOverlay");

this.currentFile="html";
this.currentBlobURL=null;

this.files={
html:"<h1>Hello Verion 🚀</h1>",
css:"body{background:#0b0f17;color:white;text-align:center}",
js:"console.log('Ready')"
};

this.load();
this.bind();
this.switchFile("html");
this.log("IDE Ready ⚡");
}

bind(){

// autosave
this.editor.addEventListener("input",()=>{
clearTimeout(this.t);
this.t=setTimeout(()=>this.save(),800);
});

// shortcuts
document.addEventListener("keydown",(e)=>{
if(e.ctrlKey && e.key==="s"){e.preventDefault();this.save();}
if(e.ctrlKey && e.key==="Enter"){this.run();}
});

// AI button
document.getElementById("askAiBtn").onclick=()=>this.askAI();
}

switchFile(type){
this.files[this.currentFile]=this.editor.value;
this.currentFile=type;

this.activeFile.innerText=
type==="html"?"index.html":
type==="css"?"style.css":"script.js";

this.editor.value=this.files[type];
this.log("Switched to "+this.activeFile.innerText);

// Auto-close sidebar on mobile after selecting a file
if(window.innerWidth < 768) {
  this.leftSidebar.classList.add("-translate-x-full");
  this.mobileOverlay.classList.add("hidden");
}
}

save(){
this.files[this.currentFile]=this.editor.value;
localStorage.setItem("verion",JSON.stringify(this.files));
this.log("Saved ✅");
}

load(){
try{
let d=JSON.parse(localStorage.getItem("verion"));
if(d)this.files=d;
}catch(e){}
}

run(){
this.save();

if(this.currentBlobURL){
URL.revokeObjectURL(this.currentBlobURL);
}

let code=`
<html>
<head><style>${this.files.css}</style></head>
<body>
${this.files.html}
<script>
try{
${this.files.js}
}catch(e){
document.body.innerHTML+="<pre style='color:red'>Error: "+e.message+"</pre>";
}
<\/script>
</body>
</html>`;

let blob=new Blob([code],{type:"text/html"});
this.currentBlobURL=URL.createObjectURL(blob);

this.previewFrame.src=this.currentBlobURL;

this.previewScreen.classList.remove("hidden");
this.previewScreen.classList.add("flex");

this.log("Running 🚀");
}

closePreview(){
this.previewScreen.classList.add("hidden");
this.previewScreen.classList.remove("flex");
this.previewFrame.src="";

if(this.currentBlobURL){
URL.revokeObjectURL(this.currentBlobURL);
this.currentBlobURL=null;
}

this.log("Preview closed","warn");
}

newProject(){
if(!confirm("New Project?"))return;

this.files={html:"",css:"",js:""};
this.editor.value="";
this.switchFile("html");

this.log("New project created","warn");
}

log(msg,type="ok"){
let c=type==="err"?"console-err":type==="warn"?"console-warn":"console-ok";
this.console.innerHTML+=`<div class="${c}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
this.console.scrollTop=this.console.scrollHeight;
}

// AI
askAI(){
let q=document.getElementById("aiPrompt").value;
if(!q)return;

let out=document.getElementById("aiOutput");
out.innerHTML+=`<div class="mb-2">🧑 ${q}</div><div class="mb-4 text-green-400">🤖 AI: Coming soon...</div>`;
out.scrollTop=out.scrollHeight;
document.getElementById("aiPrompt").value = "";
}

// toggle AI panel
toggleAI(){
this.rightSidebar.classList.toggle("hidden");
this.rightSidebar.classList.toggle("flex");
}

// toggle left sidebar
toggleSidebar(){
this.leftSidebar.classList.toggle("-translate-x-full");
this.mobileOverlay.classList.toggle("hidden");
}

}

const ide=new VerionIDE();

// global bindings
function switchFile(t){ide.switchFile(t)}
function saveCode(){ide.save()}
function runCode(){ide.run()}
function closePreview(){ide.closePreview()}
function toggleAI(){ide.toggleAI()}
function toggleSidebar(){ide.toggleSidebar()}
</script>

</body>
</html>
