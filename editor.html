<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion IDE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, system-ui, sans-serif;
    }

    textarea {
      resize: none;
      outline: none;
    }
  </style>
</head>

<body class="bg-[#0b0f17] text-white">

<div class="flex h-screen">

  <!-- LEFT -->
  <aside class="w-72 bg-[#111827] border-r border-gray-800 flex flex-col">
    <div class="p-5 border-b border-gray-800">
      <h1 class="text-xl font-bold">🚀 Verion</h1>
      <p class="text-xs text-gray-400 mt-1">Professional Cloud IDE</p>
    </div>

    <div class="p-4 space-y-3">
      <button class="w-full bg-blue-600 hover:bg-blue-500 rounded-lg py-2 font-medium">
        + New Project
      </button>

      <input
        placeholder="Search files..."
        class="w-full bg-[#1f2937] px-3 py-2 rounded-lg text-sm outline-none"
      />
    </div>

    <div class="px-4 text-xs uppercase text-gray-500 mb-2">
      Explorer
    </div>

    <div class="px-2 space-y-1">
      <button onclick="switchFile('html')"
        class="w-full text-left px-8 py-2 rounded hover:bg-[#1f2937]">
        📄 index.html
      </button>

      <button onclick="switchFile('css')"
        class="w-full text-left px-8 py-2 rounded hover:bg-[#1f2937]">
        🎨 style.css
      </button>

      <button onclick="switchFile('js')"
        class="w-full text-left px-8 py-2 rounded hover:bg-[#1f2937]">
        ⚙ script.js
      </button>
    </div>
  </aside>

  <!-- CENTER -->
  <main class="flex-1 flex flex-col">

    <!-- TOP -->
    <header class="h-14 bg-[#111827] border-b border-gray-800 flex items-center justify-between px-5">
      <div class="flex gap-2">
        <button onclick="saveCode()" class="bg-[#1f2937] px-4 py-2 rounded-lg text-sm">
          Save
        </button>

        <button onclick="runCode()" class="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-lg text-sm">
          Run
        </button>

        <button class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded-lg text-sm">
          AI
        </button>

        <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg text-sm">
          Deploy
        </button>
      </div>

      <div id="activeFile" class="text-sm text-gray-400">
        index.html
      </div>
    </header>

    <!-- WORKSPACE -->
    <div class="flex flex-1">

      <!-- EDITOR -->
      <section class="flex-1 flex flex-col border-r border-gray-800">

        <textarea
          id="editor"
          class="flex-1 bg-[#0d1117] text-white p-5 font-mono text-sm"
        ></textarea>

        <div class="h-32 bg-black border-t border-gray-800 p-4 overflow-auto">
          <div id="console" class="text-green-400 text-sm">
            Console ready...
          </div>
        </div>

      </section>

      <!-- PREVIEW -->
      <aside class="w-[40%] bg-[#111827] flex flex-col">
        <div class="h-12 border-b border-gray-800 flex items-center px-4 font-medium">
          Live Preview
        </div>

        <iframe id="preview" class="flex-1 bg-white border-0"></iframe>
      </aside>

    </div>

  </main>

</div>

<script>
let files = {
  html: "<h1>Hello Verion 🚀</h1>",
  css: "body{font-family:sans-serif;padding:20px;} h1{color:blue;}",
  js: "console.log('Verion Ready');"
};

let currentFile = "html";

const editor = document.getElementById("editor");
const activeFile = document.getElementById("activeFile");
const consoleBox = document.getElementById("console");

function switchFile(type) {
  currentFile = type;

  if (type === "html") activeFile.innerText = "index.html";
  if (type === "css") activeFile.innerText = "style.css";
  if (type === "js") activeFile.innerText = "script.js";

  editor.value = files[type];
}

function saveCode() {
  files[currentFile] = editor.value;
  consoleBox.innerText = "Saved successfully ✅";
}

function runCode() {
  files[currentFile] = editor.value;

  const output = `
    <style>${files.css}</style>
    ${files.html}
    <script>${files.js}<\/script>
  `;

  document.getElementById("preview").srcdoc = output;
  consoleBox.innerText = "App running successfully 🚀";
}

switchFile("html");
runCode();
</script>

</body>
</html>
