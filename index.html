<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verion</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

  <!-- Navbar -->
  <nav class="flex justify-between items-center p-4 bg-gray-800 shadow">
    <h1 class="text-xl font-bold">🚀 Verion</h1>
    <button class="bg-blue-600 px-4 py-2 rounded">Login</button>
  </nav>

  <!-- Main -->
  <div class="p-6">
    <h2 class="text-2xl font-semibold mb-4">Welcome to Verion</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      
      <div class="bg-gray-800 p-4 rounded">
        <h3 class="font-bold">Editor</h3>
        <p class="text-sm text-gray-400">Online coding environment</p>
      </div>

      <div class="bg-gray-800 p-4 rounded">
        <h3 class="font-bold">Projects</h3>
        <p class="text-sm text-gray-400">Manage your work</p>
      </div>

      <div class="bg-gray-800 p-4 rounded">
        <h3 class="font-bold">Deploy</h3>
        <p class="text-sm text-gray-400">One-click hosting</p>
      </div>

    </div>
  </div>

</body>
</html>
