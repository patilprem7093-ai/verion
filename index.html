h<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verion</title>
 <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">
 <!-- Navbar -->
  <nav class="flex justify-between items-center p-4 bg-gray-800 shadow">
    <h1 class="text-xl font-bold">🚀 Verion</h1>
    <button class="bg-blue-600 px-4 py-2 rounded">Login</button>
  </nav>
<!-- Main -->
  <div class="p-6">
    <h2 class="text-2xl font-semibold mb-4">Welcome to Verion</h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      
      <div class="bg-gray-800 p-4 rounded">
        <h3 class="font-bold">Editor</h3>

      <div class="bg-gray-800 p-4 rounded">
        <h3 class="font-bold">Projects</h3>

    </div>

<!-- Login Modal -->
<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
  <div class="bg-gray-800 p-6 rounded w-80">
    <h2 class="text-xl mb-4">Login</h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-2 mb-3 rounded bg-gray-700 text-white"/>

    <input id="password" type="password" placeholder="Password"
      class="w-full p-2 mb-3 rounded bg-gray-700 text-white"/>

    <button onclick="login()" class="bg-blue-600 w-full py-2 rounded">Login</button>
  </div>
</div>
<script>
function openLogin() {
  document.getElementById("loginModal").classList.remove("hidden");
}

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  if (email && password) {
    alert("Login successful (demo)");
    document.getElementById("loginModal").classList.add("hidden");
  } else {
    alert("Enter all fields");
  }
}
</script>
<button onclick="openLogin()" class="bg-blue-600 px-4 py-2 rounded">Login</button>
