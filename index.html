<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <meta name="google" content="notranslate" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  
  <meta name="theme-color" content="#0b0f17" />

  <title>Verion</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
  <body class="bg-[#0b0f17] text-white min-h-screen">

  <!-- SPLASH -->
  <div
    id="splash"
    class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-[#0b0f17]"
  >
    <div class="flex items-center gap-4">
      <div class="w-16 h-16 rounded-2xl bg-[#4F7C82] flex items-center justify-center text-3xl font-bold">
        V
      </div>
      <div>
        <h1 class="text-4xl font-bold tracking-wide">VERION</h1>
        <p class="text-gray-400 mt-1">Professional Cloud IDE</p>
      </div>
    </div>

    <div class="mt-10 w-64 h-2 bg-gray-800 rounded-full overflow-hidden">
      <div id="loader" class="h-full bg-[#4F7C82] w-0 transition-all duration-[3000ms]"></div>
    </div>
  </div>

  <!-- LOGIN PAGE -->
  <div
    id="loginPage"
    class="hidden min-h-screen flex items-center justify-center px-5"
  >
    <div class="w-full max-w-md bg-[#111827] border border-gray-800 rounded-3xl p-8 shadow-2xl">

      <div class="flex items-center gap-3 mb-8">
        <div class="w-12 h-12 rounded-xl bg-[#4F7C82] flex items-center justify-center text-xl font-bold">
          V
        </div>
        <div>
          <h2 class="text-2xl font-bold">VERION</h2>
          <p class="text-sm text-gray-400">Welcome back</p>
        </div>
      </div>

      <input
        id="email"
        type="email"
        placeholder="Email"
        class="w-full mb-4 px-4 py-3 rounded-xl bg-[#1f2937] outline-none border border-transparent focus:border-[#4F7C82]"
      />

      <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full mb-4 px-4 py-3 rounded-xl bg-[#1f2937] outline-none border border-transparent focus:border-[#4F7C82]"
      />

      <button
        id="loginBtn"
        class="w-full py-3 rounded-xl bg-[#4F7C82] hover:brightness-110 font-medium mb-3"
      >
        Login
      </button>

      <button
        id="signupBtn"
        class="w-full py-3 rounded-xl bg-white text-black hover:bg-gray-200 font-medium"
      >
        Create Account
      </button>

      <p id="msg" class="text-center text-sm mt-5 text-gray-300"></p>

    </div>
  </div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const SUPABASE_URL = "https://glxteylzcrqejaxnifiz.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdseHRleWx6Y3JxZWpheG5pZml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzAyOTksImV4cCI6MjA5MjQ0NjI5OX0.h4BurdPEYqTCST6V1d_wnMappJ11KA9uzXzcXFxyyHE";

  const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
  );

  const splash = document.getElementById("splash");
  const loginPage = document.getElementById("loginPage");
  const loader = document.getElementById("loader");
  const msg = document.getElementById("msg");

  loader.style.width = "100%";

  // Already logged in?
  try {
    const { data } = await supabase.auth.getSession();
    if (data.session) {
      window.location.href = "dashboard.html";
      return;
    }
  } catch (e) {
    console.error(e);
  }

  // Show login after 3 sec
  setTimeout(() => {
    splash.style.display = "none";
    loginPage.classList.remove("hidden");
    loginPage.classList.add("flex");
  }, 3000);

  // LOGIN
  document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      msg.innerText = "Enter email & password";
      return;
    }

    msg.innerText = "Logging in...";

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      msg.innerText = error.message;
      return;
    }

    msg.innerText = "Login success ✅";

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 800);
  };

  // SIGNUP
  document.getElementById("signupBtn").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (!email || !password) {
      msg.innerText = "Enter email & password";
      return;
    }

    msg.innerText = "Creating account...";

    const { error } = await supabase.auth.signUp({
      email,
      password
    });

    if (error) {
      msg.innerText = error.message;
      return;
    }

    msg.innerText = "Check your email 📩";
  };
});
</script>

</body>
</html>
