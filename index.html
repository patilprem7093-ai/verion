<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- NAV -->
<nav class="flex justify-between p-4 bg-gray-800">
  <h1 class="text-xl font-bold">🚀 Verion</h1>
  <button onclick="openLogin()" class="bg-blue-600 px-4 py-2 rounded">
    Login
  </button>
</nav>

<!-- CONTENT -->
<div class="p-6">
  <h2 class="text-2xl mb-4">Welcome to Verion</h2>

  <div class="space-y-4">
    <div class="bg-gray-800 p-4 rounded">Editor</div>
    <div class="bg-gray-800 p-4 rounded">Projects</div>
    <div class="bg-gray-800 p-4 rounded">Deploy</div>
  </div>
</div>

<!-- LOGIN MODAL -->
<!-- LOGIN BUTTON (Navbar me hona chahiye) -->
<button onclick="openLogin()" class="bg-blue-600 px-4 py-2 rounded hover:bg-blue-500">
  Login
</button>

<!-- LOGIN MODAL -->
<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center z-50">
  <div class="bg-gray-800 p-6 rounded-lg w-80 shadow-lg relative">

    <!-- Close Button -->
    <button onclick="closeLogin()" class="absolute top-2 right-3 text-gray-400 hover:text-white text-lg">✕</button>

    <h2 class="text-xl font-bold mb-4 text-center">Login / Sign Up</h2>

    <input id="email" type="email" placeholder="Email"
      class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500"/>

    <input id="password" type="password" placeholder="Password"
      class="w-full p-2 mb-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500"/>

    <button onclick="handleAuth()" id="loginBtn"
      class="w-full bg-blue-600 py-2 rounded font-semibold hover:bg-blue-500">
      Continue
    </button>

    <p id="authMessage" class="text-sm text-center mt-3 text-red-400"></p>

  </div>
</div>

<script>
  // ✅ Supabase Setup (tumhari keys yahi rehni chahiye)
  const supabaseUrl = 'https://glxteylzcrqejaxnifiz.supabase.co';
  const supabaseKey = 'PASTE_YOUR_KEY_HERE';
  const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

  // ✅ Modal Functions
  function openLogin() {
    document.getElementById("loginModal").classList.remove("hidden");
  }

  function closeLogin() {
    document.getElementById("loginModal").classList.add("hidden");
  }

  // ✅ AUTH FUNCTION (LOGIN + SIGNUP AUTO)
  async function handleAuth() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const msg = document.getElementById("authMessage");
    const btn = document.getElementById("loginBtn");

    if (!email || !password) {
      msg.innerText = "Enter email & password";
      return;
    }

    btn.innerText = "Please wait...";
    msg.innerText = "";

    // 🔹 Try Login
    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      // 🔹 If not exists → Signup
      const { error: signUpError } = await supabase.auth.signUp({
        email,
        password
      });

      if (signUpError) {
        msg.innerText = signUpError.message;
      } else {
        msg.className = "text-green-400 text-sm text-center mt-3";
        msg.innerText = "Account created! Check email.";
      }
    } else {
      msg.className = "text-green-400 text-sm text-center mt-3";
      msg.innerText = "Login successful!";
      setTimeout(closeLogin, 1500);
    }

    btn.innerText = "Continue";
  }
</script>

  );

  function openLogin() {
    document.getElementById("loginModal").classList.remove("hidden");
  }

  async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({ email, password });

    document.getElementById("msg").innerText =
      error ? error.message : "Account Created 🎉";
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    document.getElementById("msg").innerText =
      error ? error.message : "Login Success ✅";
  }
</script>

</body>
</html>
