<!DOCTYPE html>
<html lang="en">
<head>

  <title>Verion</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<body class="bg-gray-900 text-white">

  <!-- Navbar -->
  <nav class="flex justify-between items-center p-4 bg-gray-800 shadow">
    <h1 class="text-xl font-bold">🚀 Verion</h1>
    <button onclick="openLogin()" class="bg-blue-600 px-4 py-2 rounded">Login</button>

      <input id="email" type="email" placeholder="Email"
        class="w-full p-2 mb-3 rounded bg-gray-700 text-white"/>

      <input id="password" type="password" placeholder="Password"
        class="w-full p-2 mb-3 rounded bg-gray-700 text-white"/>

      <button onclick="login()" class="bg-blue-600 w-full py-2 rounded mb-2">
        Login
      </button>

      <button onclick="signup()" class="bg-green-600 w-full py-2 rounded">
        Create Account
      </button>

      <p id="authMessage" class="text-sm mt-3 text-center"></p>
    </div>
  </div>

      const msg = document.getElementById("authMessage");

    // SIGNUP
    async function signup() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("authMessage");

      const { error } = await client.auth.signUp({
        email,
        password
      });

        msg.className = "text-red-400 text-sm mt-3 text-center";
      } else {
        msg.innerText = "Account created 🎉";
