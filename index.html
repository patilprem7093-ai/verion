<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- NAV -->
<nav class="flex justify-between p-4 bg-gray-800">
  <h1 class="text-xl font-bold">🚀 Verion</h1>
  <button onclick="openLogin()" class="bg-blue-600 px-4 py-2 rounded">
    Login
  </button>
</nav>

<!-- CONTENT -->
<div class="p-6">
  <h2 class="text-2xl mb-4">Welcome to Verion</h2>

  <div class="space-y-4">
    <div class="bg-gray-800 p-4 rounded">Editor</div>
    <div class="bg-gray-800 p-4 rounded">Projects</div>
    <div class="bg-gray-800 p-4 rounded">Deploy</div>
  </div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center">
  <div class="bg-gray-800 p-6 rounded w-80">
    <h2 class="text-lg mb-3">Login / Signup</h2>

    <input id="email" placeholder="Email" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-2 bg-gray-700 rounded">

    <button onclick="signup()" class="bg-green-600 w-full py-2 rounded mb-2">
      Create Account
    </button>

    <button onclick="login()" class="bg-blue-600 w-full py-2 rounded">
      Login
    </button>

    <p id="msg" class="text-center text-sm mt-2"></p>
  </div>
</div>

<script>
  // ✅ SUPABASE FIXED
  const supabase = window.supabase.createClient(
    'https://glxteylzcrqejaxnifiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdseHRleWx6Y3JxZWpheG5pZml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzAyOTksImV4cCI6MjA5MjQ0NjI5OX0.h4BurdPEYqTCST6V1d_wnMappJ11KA9uzXzcXFxyyHE'
  );

  function openLogin() {
    document.getElementById("loginModal").classList.remove("hidden");
  }

  async function signup() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({ email, password });

    document.getElementById("msg").innerText =
      error ? error.message : "Account Created 🎉";
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    document.getElementById("msg").innerText =
      error ? error.message : "Login Success ✅";
  }
</script>

</body>
</html>
