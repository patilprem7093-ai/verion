<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- NAV -->
<nav class="flex justify-between p-4 bg-gray-800">
  <h1 class="text-xl font-bold">🚀 Verion</h1>
  <button id="loginBtnNav" class="bg-blue-600 px-4 py-2 rounded">Login</button>
</nav>

<!-- MAIN -->
<div class="p-6">
  <h2 class="text-2xl mb-4">Welcome to Verion</h2>

  <div class="grid grid-cols-3 gap-4">
    <button id="editorBtn" class="bg-gray-800 p-4 rounded">Editor</button>
    <button id="projectBtn" class="bg-gray-800 p-4 rounded">Projects</button>
    <button id="deployBtn" class="bg-gray-800 p-4 rounded">Deploy</button>
  </div>
</div>

<!-- MODAL -->
<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">
  <div class="bg-gray-800 p-6 rounded w-80">
    <h2 class="text-center mb-3">Login / Signup</h2>

    <input id="email" placeholder="Email" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-2 bg-gray-700 rounded">

    <button id="loginBtn" class="bg-blue-600 w-full py-2 rounded mb-2">Login</button>
    <button id="signupBtn" class="bg-green-600 w-full py-2 rounded">Create Account</button>

    <button id="closeBtn" class="w-full mt-2 text-sm text-gray-400">Close</button>

    <p id="msg" class="text-center text-sm mt-2"></p>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const supabase = window.supabase.createClient(
    'https://glxteylzcrqejaxnifiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdseHRleWx6Y3JxZWpheG5pZml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzAyOTksImV4cCI6MjA5MjQ0NjI5OX0.h4BurdPEYqTCST6V1d_wnMappJ11KA9uzXzcXFxyyHE'
  );

  const modal = document.getElementById("loginModal");
  const msg = document.getElementById("msg");

  // modal
  document.getElementById("loginBtnNav").onclick = () => modal.classList.remove("hidden");
  document.getElementById("closeBtn").onclick = () => modal.classList.add("hidden");

  // navigation
  document.getElementById("editorBtn").onclick = () => window.location.href = "editor.html";
  document.getElementById("projectBtn").onclick =() => window.location.href = "dashboard-projects.html";
  document.getElementById("deployBtn").onclick = () => window.location.href = "deploy.html";

  // LOGIN
  document.getElementById("loginBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      msg.innerText = "Enter email & password";
      return;
    }

    msg.innerText = "Logging in...";

    const { error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
      msg.innerText = error.message;
      return;
    }

    msg.innerText = "Login success ✅";
    setTimeout(() => window.location.href = "projects.html", 1000);
  };

  // SIGNUP
  document.getElementById("signupBtn").onclick = async () => {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      msg.innerText = "Enter email & password";
      return;
    }

    msg.innerText = "Creating account...";

    const { error } = await supabase.auth.signUp({ email, password });

    msg.innerText = error ? error.message : "Check email 📩";
  };

});
</script>

</body>
</html>
