<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- NAVBAR -->
<nav class="flex justify-between items-center p-4 bg-gray-800">
  <h1 class="text-xl font-bold">🚀 Verion</h1>
  <button onclick="openLogin()" class="bg-blue-600 px-4 py-2 rounded">
    Login
  </button>
</nav>

<!-- MAIN -->
<div class="p-6">
  <h2 class="text-2xl mb-4">Welcome to Verion</h2>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-4">

    <button onclick="testBtn('Editor')" class="bg-gray-800 p-4 rounded">
      Editor
    </button>

    <button onclick="testBtn('Projects')" class="bg-gray-800 p-4 rounded">
      Projects
    </button>

    <button onclick="testBtn('Deploy')" class="bg-gray-800 p-4 rounded">
      Deploy
    </button>

  </div>
</div>

<!-- LOGIN MODAL -->
<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center">

  <div class="bg-gray-800 p-6 rounded w-80">

    <h2 class="text-lg mb-3 text-center">Login / Sign Up</h2>

    <input id="email" placeholder="Email" class="w-full p-2 mb-2 bg-gray-700 rounded">
    <input id="password" type="password" placeholder="Password" class="w-full p-2 mb-2 bg-gray-700 rounded">

    <button onclick="handleAuth()" class="bg-blue-600 w-full py-2 rounded">
      Continue
    </button>

    <button onclick="closeLogin()" class="mt-2 text-sm text-gray-400 w-full">
      Close
    </button>

  </div>

</div>

<script>
  // ✅ SUPABASE CONNECT
  const supabase = window.supabase.createClient(
    'https://glxteylzcrqejaxnifiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdseHRleWx6Y3JxZWpheG5pZml6Iiwicm9sZSI": "anon","iat":1776870299,"exp":2092446299}'
  );

  // ✅ UI FUNCTIONS
  function openLogin() {
    document.getElementById("loginModal").classList.remove("hidden");
  }

  function closeLogin() {
    document.getElementById("loginModal").classList.add("hidden");
  }

  // ✅ AUTH SYSTEM
  async function handleAuth() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if (!email || !password) {
      alert("Enter email & password");
      return;
    }

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      const { error: signUpError } = await supabase.auth.signUp({
        email,
        password
      });

      if (signUpError) {
        alert(signUpError.message);
      } else {
        alert("Account created 🎉");
      }
    } else {
      alert("Login successful ✅");
      closeLogin();
    }
  }

  // ✅ BUTTON TEST
  function testBtn(name) {
    alert(name + " working ✅");
  }
</script>

</body>
</html>
