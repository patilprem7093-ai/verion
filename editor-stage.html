<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion Editor Stage</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Monaco -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #editor {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body class="bg-gray-950 text-white flex flex-col h-screen overflow-hidden">

<!-- TOP BAR -->
<div class="flex justify-between items-center p-3 bg-gray-900 border-b border-gray-800 shrink-0">
  <h1 class="font-bold">🚀 Verion Editor Stage</h1>
  <button onclick="runCode()" class="bg-green-600 hover:bg-green-700 px-4 py-1 rounded">
    Run
  </button>
</div>

<!-- MAIN -->
<div class="grid grid-cols-2 flex-1 min-h-0">

  <!-- EDITOR -->
  <div id="editor" class="border-r border-gray-800"></div>

  <!-- OUTPUT -->
  <div class="p-4 bg-gray-900 overflow-auto">
    <h2 class="text-lg mb-2">Output</h2>
    <pre id="output" class="text-green-400 text-sm whitespace-pre-wrap"></pre>
  </div>

</div>

<script>
let editor;

// Monaco Loader Fix
require.config({
  paths: {
    vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs"
  }
});

require(["vs/editor/editor.main"], function () {

  editor = monaco.editor.create(document.getElementById("editor"), {
    value: `// Welcome to Verion Editor
console.log("Hello World 🚀");`,
    language: "javascript",
    theme: "vs-dark",
    automaticLayout: true,
    fontSize: 14
  });

}, function (err) {
  console.error("Monaco failed to load:", err);
});

// SAFE RUN FUNCTION
async function runCode() {
  const outputBox = document.getElementById("output");
  outputBox.textContent = ""; // clear old output

  if (!editor) {
    outputBox.textContent = "Editor not loaded yet!";
    return;
  }

  const code = editor.getValue();

  let logs = [];

  // Enhanced console
  const customConsole = {
    log: (...args) => logs.push("[LOG] " + args.join(" ")),
    error: (...args) => logs.push("[ERROR] " + args.join(" ")),
    warn: (...args) => logs.push("[WARN] " + args.join(" ")),
    info: (...args) => logs.push("[INFO] " + args.join(" "))
  };

  try {
    // Async support + isolation
    const AsyncFunction = Object.getPrototypeOf(async function(){}).constructor;

    const func = new AsyncFunction("console", `
      "use strict";
      try {
        ${code}
      } catch (e) {
        console.error(e.message);
      }
    `);

    await func(customConsole);

    outputBox.textContent = logs.length ? logs.join("\n") : "No output";

  } catch (err) {
    outputBox.textContent = "Fatal Error:\n" + err.stack;
  }
}
</script>

</body>
</html>
