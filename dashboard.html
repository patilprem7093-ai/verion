<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard - Verion</title>
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="google" content="notranslate" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#111827" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-[#0b0f17] text-white min-h-screen font-sans">

<nav class="sticky top-0 z-50 flex justify-between items-center p-4 bg-[#111827] border-b border-gray-800 shadow-lg">
  <div class="flex items-center gap-2">
    <div class="w-8 h-8 rounded-lg bg-[#4F7C82] flex items-center justify-center font-bold text-sm">V</div>
    <h1 class="text-lg font-bold tracking-tight">Verion</h1>
  </div>
  <div id="userArea" class="flex items-center gap-3"></div>
</nav>

<main class="p-5 max-w-5xl mx-auto">
  <div class="mb-8">
    <h2 id="welcomeText" class="text-3xl font-bold text-white">Welcome</h2>
    <p class="text-gray-400 mt-1">What would you like to build today?</p>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

    <button onclick="location.href='editor.html'"
      class="group relative overflow-hidden bg-[#111827] border border-gray-800 p-6 rounded-3xl hover:border-[#4F7C82] transition-all text-left shadow-xl">
      <div class="text-3xl mb-3">💻</div>
      <h3 class="text-xl font-bold mb-1">Open Editor</h3>
      <p class="text-sm text-gray-400">Launch the cloud IDE and start coding.</p>
    </button>

    <button onclick="location.href='dashboard-projects.html'"
      class="group bg-[#111827] border border-gray-800 p-6 rounded-3xl hover:border-[#4F7C82] transition-all text-left shadow-xl">
      <div class="text-3xl mb-3">📁</div>
      <h3 class="text-xl font-bold mb-1">My Projects</h3>
      <p class="text-sm text-gray-400">Manage your saved work and repositories.</p>
    </button>

    <button onclick="location.href='deploy.html'"
      class="group bg-[#111827] border border-gray-800 p-6 rounded-3xl hover:border-[#4F7C82] transition-all text-left shadow-xl">
      <div class="text-3xl mb-3">🚀</div>
      <h3 class="text-xl font-bold mb-1">Deployment</h3>
      <p class="text-sm text-gray-400">Ship your code to production instantly.</p>
    </button>

  </div>
</main>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  const supabase = window.supabase.createClient(
    'https://glxteylzcrqejaxnifiz.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdseHRleWx6Y3JxZWpheG5pZml6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NzAyOTksImV4cCI6MjA5MjQ0NjI5OX0.h4BurdPEYqTCST6V1d_wnMappJ11KA9uzXzcXFxyyHE'
  );

  const userArea = document.getElementById("userArea");
  userArea.innerHTML = `<div class="animate-pulse w-20 h-4 bg-gray-700 rounded"></div>`;

  try {
    const { data: { session }, error } = await supabase.auth.getSession();
    if (error || !session) {
      window.location.href = "index.html";
      return;
    }
    renderUser(session.user);
  } catch (err) {
    window.location.href = "index.html";
  }

  function renderUser(user) {
    userArea.innerHTML = "";
    const logoutBtn = document.createElement("button");
    logoutBtn.className = "text-xs font-bold bg-red-500/10 text-red-500 px-3 py-1.5 rounded-full border border-red-500/20 hover:bg-red-500 hover:text-white transition-all";
    logoutBtn.textContent = "Logout";
    logoutBtn.onclick = async () => {
      await supabase.auth.signOut();
      window.location.href = "index.html";
    };
    userArea.appendChild(logoutBtn);
    document.getElementById("welcomeText").innerText = "Hi, " + user.email.split('@')[0];
  }
});
</script>
</body>
</html>
