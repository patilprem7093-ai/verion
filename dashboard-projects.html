<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Verion Projects</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- NAV -->
<nav class="flex justify-between items-center p-4 bg-gray-800">
  <h1 class="text-xl font-bold">🚀 Verion Projects</h1>
  <div id="userArea"></div>
</nav>

<!-- MAIN -->
<div class="p-6">
  <h2 class="text-2xl mb-4">Your Projects</h2>

  <!-- CREATE -->
  <div class="mb-4 flex gap-2">
    <input id="projectName" placeholder="Project name"
      class="p-2 bg-gray-700 rounded w-full">

    <button id="createBtn"
      class="bg-green-600 px-4 py-2 rounded">
      Create
    </button>
  </div>

  <!-- MESSAGE -->
  <p id="statusMsg" class="text-sm mb-2 text-gray-400"></p>

  <!-- LIST -->
  <div id="projectList" class="space-y-2"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const supabase = window.supabase.createClient(
    'YOUR_SUPABASE_URL',
    'YOUR_PUBLIC_ANON_KEY'
  );

  const userArea = document.getElementById("userArea");
  const list = document.getElementById("projectList");
  const msg = document.getElementById("statusMsg");
  const input = document.getElementById("projectName");
  const createBtn = document.getElementById("createBtn");

  // 🔐 AUTH CHECK
  const { data, error } = await supabase.auth.getUser();

  if (error || !data.user) {
    window.location.href = "index.html";
    return;
  }

  const user = data.user;

  // 👤 USER UI
  userArea.innerHTML = `
    <span class="mr-3 text-sm">${user.email}</span>
    <button id="logoutBtn" class="bg-red-600 px-3 py-1 rounded">Logout</button>
  `;

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await supabase.auth.signOut();
    window.location.href = "index.html";
  });

  // 📦 LOAD PROJECTS
  async function loadProjects() {
    msg.innerText = "Loading...";

    const { data, error } = await supabase
      .from("projects")
      .select("*")
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });

    if (error) {
      msg.innerText = "Failed to load projects ❌";
      console.error(error);
      return;
    }

    list.innerHTML = "";

    if (!data || data.length === 0) {
      msg.innerText = "No projects yet.";
      return;
    }

    msg.innerText = "";

    data.forEach(project => {
      const div = document.createElement("div");
      div.className = "bg-gray-800 p-3 rounded flex justify-between items-center";

      const name = document.createElement("span");
      name.textContent = project.name;

      const delBtn = document.createElement("button");
      delBtn.textContent = "Delete";
      delBtn.className = "text-red-400";

      delBtn.addEventListener("click", () => deleteProject(project.id));

      div.appendChild(name);
      div.appendChild(delBtn);
      list.appendChild(div);
    });
  }

  // ➕ CREATE PROJECT
  async function createProject() {
    const name = input.value.trim();

    if (!name) {
      msg.innerText = "Please enter project name";
      return;
    }

    createBtn.disabled = true;
    msg.innerText = "Creating...";

    const { error } = await supabase.from("projects").insert([
      {
        name,
        user_id: user.id
      }
    ]);

    createBtn.disabled = false;

    if (error) {
      msg.innerText = "Failed to create ❌";
      console.error(error);
      return;
    }

    input.value = "";
    msg.innerText = "Project created ✅";

    loadProjects();
  }

  createBtn.addEventListener("click", createProject);

  // ❌ DELETE PROJECT
  async function deleteProject(id) {
    const confirmDelete = confirm("Are you sure you want to delete this project?");
    if (!confirmDelete) return;

    msg.innerText = "Deleting...";

    const { error } = await supabase
      .from("projects")
      .delete()
      .eq("id", id);

    if (error) {
      msg.innerText = "Delete failed ❌";
      console.error(error);
      return;
    }

    msg.innerText = "Deleted ✅";
    loadProjects();
  }

  // 🚀 INITIAL LOAD
  loadProjects();

});
</script>

</body>
</html>
