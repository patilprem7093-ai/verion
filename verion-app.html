<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verion SaaS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- 🔐 CSP SECURITY -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com;
    style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
    connect-src 'self' https://*.supabase.co;
    img-src 'self' data:;
  ">

  <!-- ✅ STYLES -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- ⚠️ Load scripts AFTER DOM -->
</head>

<body class="bg-gray-900 text-white">

<!-- NAV -->
<nav class="flex justify-between p-4 bg-gray-800">
  <h1 class="font-bold">🚀 Verion</h1>
  <div id="userArea"></div>
</nav>

<!-- MAIN -->
<div class="grid grid-cols-3 gap-4 p-4">

  <!-- PROJECT PANEL -->
  <div class="col-span-1 bg-gray-800 p-3 rounded">
    <h2 class="mb-2 font-bold">Projects</h2>

    <input id="projectName"
           class="w-full p-2 bg-gray-700 rounded mb-2"
           placeholder="New project" />

    <button id="createBtn"
            class="bg-green-600 w-full py-2 rounded mb-2">
      Create
    </button>

    <p id="msg" class="text-xs text-gray-400 mb-2"></p>

    <div id="projectList" class="space-y-2"></div>
  </div>

  <!-- EDITOR -->
  <div class="col-span-2 bg-gray-800 p-3 rounded">
    <h2 class="mb-2 font-bold">Editor</h2>
    <div id="editor" style="height:500px;"></div>
  </div>

</div>

<script type="module">
/* =========================================================
   🔐 CONFIG (SAFE)
========================================================= */

// ❗ NEVER hardcode keys in production
const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "PUBLIC_ANON_KEY";

/* Dynamic import (safer control) */
const { createClient } = await import(
  "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
);

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* =========================================================
   🧠 STATE
========================================================= */

let currentUser = null;
let editor = null;
let editorReady = false;

/* =========================================================
   🚀 INIT
========================================================= */

document.addEventListener("DOMContentLoaded", init);

async function init() {
  await checkAuth();
  initUI();
  await initMonaco();
}

/* =========================================================
   🔑 AUTH (HARDENED)
========================================================= */

async function checkAuth() {
  const { data, error } = await supabase.auth.getSession();

  if (error || !data.session) {
    redirectToLogin();
    return;
  }

  currentUser = data.session.user;

  renderUser();
}

function redirectToLogin() {
  window.location.href = "index.html";
}

function renderUser() {
  const userArea = document.getElementById("userArea");

  userArea.textContent = ""; // prevent injection

  const span = document.createElement("span");
  span.className = "text-sm mr-2";
  span.textContent = currentUser.email;

  const btn = document.createElement("button");
  btn.textContent = "Logout";
  btn.className = "bg-red-600 px-2 py-1 rounded";
  btn.onclick = logout;

  userArea.appendChild(span);
  userArea.appendChild(btn);
}

async function logout() {
  await supabase.auth.signOut();
  redirectToLogin();
}

/* =========================================================
   🧱 INPUT SANITIZER
========================================================= */

function sanitize(input) {
  return input.replace(/[<>]/g, "");
}

/* =========================================================
   📦 UI
========================================================= */

function initUI() {
  document.getElementById("createBtn").addEventListener("click", createProject);
  loadProjects();
}

/* =========================================================
   📁 PROJECTS (SAFE)
========================================================= */

async function loadProjects() {
  const list = document.getElementById("projectList");
  const msg = document.getElementById("msg");

  list.textContent = "";

  const { data, error } = await supabase
    .from("projects")
    .select("id, name")
    .order("created_at", { ascending: false });

  if (error) {
    msg.textContent = "Error loading projects";
    return;
  }

  if (!data || data.length === 0) {
    msg.textContent = "No projects yet";
    return;
  }

  data.forEach(project => {
    const div = document.createElement("div");

    div.className = "bg-gray-700 p-2 rounded cursor-pointer";
    div.textContent = project.name; // SAFE

    div.addEventListener("click", () => loadFile(project.name));

    list.appendChild(div);
  });
}

async function createProject() {
  const input = document.getElementById("projectName");
  const msg = document.getElementById("msg");

  let name = sanitize(input.value.trim());

  if (!name || name.length > 50) {
    msg.textContent = "Invalid name";
    return;
  }

  msg.textContent = "Creating...";

  const { error } = await supabase.from("projects").insert([
    { name }
  ]);

  if (error) {
    msg.textContent = "Failed";
    return;
  }

  input.value = "";
  msg.textContent = "Created ✅";

  loadProjects();
}

/* =========================================================
   🧠 MONACO (SAFE LOAD)
========================================================= */

async function initMonaco() {
  await loadScript(
    "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"
  );

  require.config({
    paths: {
      vs: "https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs"
    }
  });

  return new Promise(resolve => {
    require(["vs/editor/editor.main"], function () {
      editor = monaco.editor.create(document.getElementById("editor"), {
        value: "// Start coding...",
        language: "javascript",
        theme: "vs-dark"
      });

      editorReady = true;
      resolve();
    });
  });
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.body.appendChild(s);
  });
}

/* =========================================================
   📄 FILE LOADER
========================================================= */

function loadFile(name) {
  if (!editorReady) return;

  editor.setValue(`// Project: ${name}`);
}

</script>

</body>
</html>
